<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Polymarket Market Scanner</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Detector controls">
        <div>
          <p class="eyebrow">Polymarket scanner</p>
          <h1>Market Detector</h1>
        </div>
        <div class="status-pill" id="runState">Idle</div>
      </section>

      <section class="controls" aria-label="Scan settings">
        <label>
          <span>Section</span>
          <select id="marketType">
            <option value="weather">Weather</option>
            <option value="politics">Politics</option>
            <option value="sports">Sports</option>
            <option value="crypto">Crypto</option>
            <option value="all">All</option>
          </select>
        </label>
        <label>
          <span>Scan date</span>
          <input id="scanDate" type="date">
        </label>
        <label>
          <span>Min alert cents</span>
          <input id="threshold" type="number" min="1" max="99" step="1" value="94">
        </label>
        <label>
          <span>Min cents</span>
          <input id="minCents" type="number" min="0" max="100" step="0.01" value="0">
        </label>
        <label>
          <span>Max cents</span>
          <input id="maxCents" type="number" min="0" max="100" step="0.01" value="100">
        </label>
        <label>
          <span>Search query</span>
          <input id="query" type="search" placeholder="12 may, election, bitcoin">
        </label>
        <button id="scanNow" type="button">Search</button>
      </section>

      <section class="summary" aria-label="Scan summary">
        <div>
          <span class="metric" id="marketCount">0</span>
          <span class="label">shown markets</span>
        </div>
        <div>
          <span class="metric warn" id="alertCount">0</span>
          <span class="label">at threshold</span>
        </div>
        <div>
          <span class="metric" id="rangeSummary">0-100c</span>
          <span class="label">cents range</span>
        </div>
        <div>
          <span class="metric" id="lastScan">Never</span>
          <span class="label">last scan</span>
        </div>
      </section>

      <section class="results" aria-live="polite">
        <div class="section-head">
          <h2>Live Matches</h2>
          <p id="querySummary"></p>
        </div>
        <div id="resultsList" class="market-list empty">
          <p>No search yet. Pick a section, add an optional query, then scan.</p>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
